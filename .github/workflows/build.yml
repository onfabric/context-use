name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: build:required
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - uses: ./.github/actions/prepare

      - name: Build
        run: uv build

      # TODO: remove — temporary step to verify checks catch real issues
      - name: Corrupt artifacts to test checks
        run: |
          echo "stray file" > stray.txt
          zip dist/*.whl stray.txt
          gzip -d dist/*.tar.gz
          tar --append -f dist/*.tar stray.txt
          gzip dist/*.tar
          rm stray.txt

      - name: Check package (should fail)
        run: |
          # uv run twine check --strict dist/*
          uv run check-wheel-contents dist/

name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: build:required
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - uses: ./.github/actions/prepare

      - name: Build
        run: uv build

      # TODO: remove — temporary step to verify check-wheel-contents catches stray toplevel entries
      - name: Corrupt wheel to test checks
        run: |
          python3 -c "
          import glob, zipfile
          whl = glob.glob('dist/*.whl')[0]
          with zipfile.ZipFile(whl, 'a') as z:
              z.writestr('tests/__init__.py', '')
          "

      - name: Check package (should fail on W202)
        run: |
          # uv run twine check --strict dist/*
          uv run check-wheel-contents dist/

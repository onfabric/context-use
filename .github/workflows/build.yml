name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: build:required
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - uses: ./.github/actions/prepare

      - name: Build
        run: uv build

      # TODO: remove — temporary debug steps
      - name: List wheel contents before corruption
        run: unzip -l dist/*.whl

      - name: List sdist contents before corruption
        run: tar tzf dist/*.tar.gz

      - name: Corrupt wheel
        run: |
          python3 -c "
          import glob, zipfile
          whl = glob.glob('dist/*.whl')[0]
          print(f'Corrupting {whl}')
          with zipfile.ZipFile(whl, 'a') as z:
              z.writestr('tests/__init__.py', '')
          "

      - name: List wheel contents after corruption
        run: unzip -l dist/*.whl

      - name: Check package (should fail)
        run: |
          uv run twine check --strict dist/*
          uv run check-wheel-contents dist/

name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: build:required
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - uses: ./.github/actions/prepare

      - name: Build
        run: uv build

      - name: Check package
        run: |
          uv run twine check --strict dist/*
          uv run check-wheel-contents dist/

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  smoke:
    name: "smoke (py${{ matrix.python-version }}):required"
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: astral-sh/setup-uv@v7

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install wheel
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install dist/*.whl

      - name: Verify CLI
        run: uv run context-use --version
